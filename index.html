<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omena0 — GitHub Portfolio</title>

  <!-- SEO -->
  <meta name="description" content="Omena0's developer portfolio — open-source projects, tools, and experiments.">
  <meta name="author" content="Omena0">
  <meta name="keywords" content="Omena0, developer, portfolio, GitHub, open source">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://omena0.github.io/">

  <!-- Open Graph / Discord -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://omena0.github.io/">
  <meta property="og:title" content="Omena0 — GitHub Portfolio">
  <meta property="og:description" content="Open-source projects, tools, and experiments by Omena0.">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/Omena0">
  <meta property="og:site_name" content="Omena0">
  <meta name="theme-color" content="#0d1117">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Omena0 — GitHub Portfolio">
  <meta name="twitter:description" content="Open-source projects, tools, and experiments by Omena0.">

  <!-- Dark Reader hint -->
  <meta name="color-scheme" content="dark">
  <meta name="darkreader-lock">

  <!--
    Preconnect to critical third-party origins.
    Saves ~300–320 ms on LCP by establishing connections early.
    Kept to ≤4 origins as recommended.
  -->
  <link rel="preconnect" href="https://api.github.com">
  <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin>
  <link rel="preconnect" href="https://github-readme-testaustime.vercel.app" crossorigin>
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #abb5c1;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --badge-bg: #1f2937;
      --pin-glow: #58a6ff22;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /*
      Links: add underline so they are distinguishable without relying on
      colour alone (fixes "Links rely on colour to be distinguishable").
    */
    a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: color .2s, text-decoration-color .2s;
    }
    a:hover {
      color: var(--accent-hover);
      text-decoration-color: var(--accent-hover);
    }

    /* ---- Header / Profile ---- */
    .profile {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .profile img {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 2px solid var(--border);
      /* Prevent layout shift — space is reserved even before the image loads */
    }
    .profile-info h1 { font-size: 1.6rem; font-weight: 600; }
    .profile-info p { color: var(--text-muted); margin-top: .25rem; }
    .profile-info .bio { color: var(--text); margin-top: .5rem; }
    .profile-links { display: flex; gap: .75rem; margin-top: .5rem; flex-wrap: wrap; }
    .profile-links a {
      font-size: .85rem;
      padding: .3rem .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background .2s, border-color .2s;
      text-decoration: none; /* pill-button style — no underline needed */
    }
    .profile-links a:hover { background: var(--surface); border-color: var(--accent); text-decoration: none; }

    /* ---- Section ---- */
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
    }
    .section h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section h2 .icon { font-size: 1.1rem; }

    /*
      Reserve space for the repo section while data loads so the rest of the
      page doesn't shift when cards appear (reduces CLS on #repoSection).
    */
    #repoSection .repo-grid,
    #repoSection > div { min-height: 160px; }

    /* ---- Repo grid ---- */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.15rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: border-color .2s, box-shadow .2s;
      /* Repo cards are pill-style — suppress underline */
      text-decoration: none;
    }
    .repo-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--pin-glow);
      text-decoration: none;
    }
    .repo-card.pinned {
      border-color: #58a6ff55;
      box-shadow: 0 0 8px var(--pin-glow);
    }
    .repo-card .name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .repo-card .name .pin-badge {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--accent);
      background: var(--badge-bg);
      padding: .15rem .45rem;
      border-radius: 4px;
    }
    .repo-card .desc {
      color: var(--text-muted);
      font-size: .875rem;
      flex: 1;
    }
    .repo-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      font-size: .8rem;
      color: var(--text-muted);
      align-items: center;
    }
    .repo-card .meta .lang-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .repo-card .meta span { display: flex; align-items: center; gap: .25rem; }

    /* ---- Loading / Error ---- */
    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .error { color: #f85149; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- README ---- */
    .readme-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 2rem;
      overflow: auto;
    }
    .readme-card h1, .readme-card h2, .readme-card h3,
    .readme-card h4, .readme-card h5, .readme-card h6 {
      margin-top: 1.2em; margin-bottom: .5em; font-weight: 600;
      border-bottom: 1px solid var(--border); padding-bottom: .3em;
      color: var(--text);
    }
    .readme-card h1 { font-size: 2em; }
    .readme-card h2 { font-size: 1.5em; }
    .readme-card h3 { font-size: 1.25em; }
    .readme-card h4 { font-size: 1em; }
    .readme-card h5 { font-size: .875em; }
    .readme-card h6 { font-size: .85em; }
    .readme-card h1:first-child, .readme-card h2:first-child { margin-top: 0; }
    .readme-card p { margin: .6em 0; }
    /*
      All readme images: reserve a minimum height so they don't shift content
      below them. Explicit width/height attrs are also set in JS.
    */
    .readme-card img {
      max-width: 100%;
      border-radius: 6px;
      height: auto;
      /* Prevent layout shift for images whose dimensions are known at render */
      content-visibility: auto;
    }
    .readme-card a { color: var(--accent); }
    .readme-card a:hover { color: var(--accent-hover); }
    .readme-card code {
      background: var(--bg); padding: .15em .4em; border-radius: 4px;
      font-size: .9em;
    }
    .readme-card pre {
      background: var(--bg); padding: 1em; border-radius: 6px;
      overflow-x: auto; margin: .8em 0;
    }
    .readme-card pre code { background: none; padding: 0; }
    .readme-card ul, .readme-card ol { padding-left: 1.5em; margin: .5em 0; }
    .readme-card blockquote {
      border-left: 3px solid var(--accent); padding-left: 1em;
      color: var(--text-muted); margin: .8em 0;
    }
    .readme-card table {
      border-collapse: collapse; width: 100%; margin: .8em 0;
    }
    .readme-card th, .readme-card td {
      border: 1px solid var(--border); padding: .5em .75em; text-align: left;
    }
    .readme-card th { background: var(--bg); }
    .readme-card hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: .8rem;
    }

    /* ---- Mobile ---- */
    @media (max-width: 600px) {
      .profile { flex-direction: column; text-align: center; padding-top: 2rem; }
      .profile-links { justify-content: center; }
      .repo-grid { grid-template-columns: 1fr; }
      .readme-card { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!--
    <main> landmark wraps all primary page content.
    Fixes "Document does not have a main landmark" audit failure.
  -->
  <header class="profile" id="profile">
    <!--
      width & height attributes: the browser reserves exactly 96×96 px before
      the image loads, eliminating the layout shift caused by an unsized image.
      fetchpriority="high": tells the browser to fetch the avatar (LCP
      candidate while the README loads) with high priority, reducing LCP.
    -->
    <img
      id="avatar"
      alt="Omena0's GitHub avatar"
      src="https://avatars.githubusercontent.com/u/Omena0"
      width="96"
      height="96"
      fetchpriority="high"
    >
    <div class="profile-info">
      <h1 id="displayName">Omena0</h1>
      <p id="username">@Omena0</p>
      <p class="bio" id="bio"></p>
      <div class="profile-links" id="profileLinks"></div>
    </div>
  </header>

  <main>
    <section class="section" id="readmeSection" style="display:none" aria-label="About Me">
      <h2>About Me</h2>
      <div class="readme-card" id="readmeContent"></div>
    </section>

    <section class="section" id="pinnedSection" style="display:none" aria-label="Pinned repositories">
      <h2>Pinned</h2>
      <div class="repo-grid" id="pinnedGrid"></div>
    </section>

    <section class="section" id="repoSection" aria-label="Repositories">
      <h2>Repositories</h2>
      <div id="repoContent">
        <div class="loading" aria-live="polite"><div class="spinner" role="status" aria-label="Loading"></div>Loading repositories&hellip;</div>
      </div>
    </section>
  </main>

  <footer>
    Built with the GitHub API &middot; <a href="https://github.com/Omena0" aria-label="Omena0 on GitHub">github.com/Omena0</a>
  </footer>

<script>
  const GH_USER = 'Omena0';

  // Add your pinned repo names here (must match exact GitHub repo names)
  const PINNED_REPOS = ['PyJavaBridge', 'fr', 'http', 'SRP'];

  // GitHub language colors (common subset)
  const langColors = {
    JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5', Java:'#b07219',
    'C++':'#f34b7d', C:'#555555', 'C#':'#178600', Go:'#00ADD8', Rust:'#dea584',
    Ruby:'#701516', PHP:'#4F5D95', Shell:'#89e051', HTML:'#e34c26', CSS:'#563d7c',
    Lua:'#000080', Kotlin:'#A97BFF', Swift:'#F05138', Dart:'#00B4AB',
    Vue:'#41b883', SCSS:'#c6538c', Makefile:'#427819', Batchfile:'#C1F12E',
    PowerShell:'#012456', Dockerfile:'#384d54', Nix:'#7e7eff', Zig:'#ec915c',
    AutoHotkey:'#6594b9', GDScript:'#355570',
  };

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    return res.json();
  }

  // Fetch profile README (Omena0/Omena0 repo) as rendered HTML
  async function fetchProfileReadme() {
    try {
      const res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_USER}/readme`, {
        headers: { Accept: 'application/vnd.github.html' }
      });
      if (!res.ok) return null;
      return await res.text();
    } catch {
      return null;
    }
  }

  function buildCard(repo, pinned) {
    const card = document.createElement('a');
    card.className = 'repo-card' + (pinned ? ' pinned' : '');
    card.href = repo.html_url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    // Provide a discernible name for screen readers ("Links do not have a discernible name")
    card.setAttribute('aria-label', `${repo.name}${repo.description ? ': ' + repo.description : ''} — open on GitHub`);

    const langDot = repo.language
      ? `<span class="lang-dot" style="background:${langColors[repo.language] || '#8b949e'}" aria-hidden="true"></span> <span>${repo.language}</span>`
      : '';

    card.innerHTML = `
      <div class="name">
        ${repo.name}
        ${pinned ? '<span class="pin-badge">pinned</span>' : ''}
      </div>
      <div class="desc">${repo.description || '<em>No description</em>'}</div>
      <div class="meta">
        ${langDot ? `<span>${langDot}</span>` : ''}
        ${repo.stargazers_count ? `<span aria-label="${repo.stargazers_count} stars">&#11088; ${repo.stargazers_count}</span>` : ''}
        ${repo.forks_count ? `<span aria-label="${repo.forks_count} forks">&#127860; ${repo.forks_count}</span>` : ''}
      </div>
    `;
    return card;
  }

  async function init() {
    try {
      // Kick off all requests in parallel
      const pinnedNames = new Set(PINNED_REPOS);
      const [user, repos, readmeHtml] = await Promise.all([
        fetchJSON(`https://api.github.com/users/${GH_USER}`),
        fetchJSON(`https://api.github.com/users/${GH_USER}/repos?per_page=21&sort=updated`),
        fetchProfileReadme(),
      ]);

      // Profile — update src rather than replacing the element so the
      // browser doesn't create a new layout box (avoids CLS)
      const avatarEl = document.getElementById('avatar');
      if (user.avatar_url) avatarEl.src = user.avatar_url;
      document.getElementById('displayName').textContent = user.name || user.login;
      document.getElementById('username').textContent = '@' + user.login;
      document.getElementById('bio').textContent = user.bio || '';

      // Update OG image now that we have the real avatar
      const ogImg = document.querySelector('meta[property="og:image"]');
      if (ogImg) ogImg.content = user.avatar_url;

      // Profile links
      const links = document.getElementById('profileLinks');
      links.innerHTML = `<a href="${user.html_url}" target="_blank" rel="noopener noreferrer" aria-label="Omena0 on GitHub">GitHub</a>`;
      if (user.blog) {
        const blogUrl = user.blog.startsWith('http') ? user.blog : 'https://' + user.blog;
        links.innerHTML += `<a href="${blogUrl}" target="_blank" rel="noopener noreferrer" aria-label="Omena0's website">Website</a>`;
      }
      if (user.twitter_username) {
        links.innerHTML += `<a href="https://twitter.com/${encodeURIComponent(user.twitter_username)}" target="_blank" rel="noopener noreferrer" aria-label="Omena0 on Twitter">Twitter</a>`;
      }

      // Profile README
      if (readmeHtml) {
        const readmeSection = document.getElementById('readmeSection');
        readmeSection.style.display = '';
        const readmeContent = document.getElementById('readmeContent');
        readmeContent.innerHTML = readmeHtml;

        // Remove octicon anchor link SVGs
        readmeContent.querySelectorAll('.octicon-link, a.anchor').forEach(el => el.remove());

        // Decode camo.githubusercontent.com proxy URLs back to original sources
        let isFirstImg = true;
        readmeContent.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src') || '';

          // --- Fix CLS: add explicit width/height from attributes or fallback values ---
          // If the element already has height/width HTML attrs, honour them;
          // otherwise set sensible defaults so the browser reserves space.
          const attrH = img.getAttribute('height');
          const attrW = img.getAttribute('width');
          if (attrH && !img.style.height) img.style.height = attrH + 'px';
          if (attrW && !img.style.width)  img.style.width  = attrW + 'px';
          // Always keep max-width safe
          img.style.maxWidth = '100%';
          if (!attrH && !attrW) {
            // Unsized image: give it an aspect-ratio so the browser reserves
            // space without fixing a hard pixel size
            img.style.aspectRatio = '3 / 1';
            img.style.height = 'auto';
          }

          // --- Fix LCP: first readme image gets fetchpriority=high ---
          if (isFirstImg) {
            img.setAttribute('fetchpriority', 'high');
            isFirstImg = false;
          } else {
            // Non-LCP images: lazy-load to avoid competing with LCP resource
            img.loading = 'lazy';
          }

          // --- Fix accessibility: ensure all images have alt text ---
          if (!img.getAttribute('alt')) {
            // Derive a label from the surrounding anchor or a generic fallback
            const anchor = img.closest('a');
            const anchorTitle = anchor ? (anchor.getAttribute('title') || '') : '';
            img.alt = anchorTitle || 'README image';
          }

          // --- Decode camo URLs / fix relative paths ---
          if (src.includes('camo.githubusercontent.com')) {
            try {
              const url = new URL(src);
              const parts = url.pathname.split('/').filter(Boolean);
              if (parts.length >= 2) {
                const hex = parts[parts.length - 1];
                const decoded = hex.match(/.{2}/g).map(b => String.fromCharCode(parseInt(b, 16))).join('');
                if (decoded.startsWith('http')) img.src = decoded;
              }
            } catch {}
          } else if (src && !src.startsWith('http')) {
            img.src = `https://raw.githubusercontent.com/${GH_USER}/${GH_USER}/main/${src}`;
          }
        });

        readmeContent.querySelectorAll('a').forEach(a => {
          const href = a.getAttribute('href');
          if (href && !href.startsWith('http') && !href.startsWith('#') && !href.includes(':')) {
            a.href = `https://github.com/${GH_USER}/${GH_USER}/blob/main/${href}`;
          }
          // Ensure external readme links open safely
          if (a.href && a.href.startsWith('http') && !a.href.includes('omena0.github.io')) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
          }
          // Fix discernible name: if the link only contains an image, use the image alt
          if (!a.textContent.trim() && a.querySelector('img')) {
            const imgEl = a.querySelector('img');
            if (imgEl && imgEl.alt) a.setAttribute('aria-label', imgEl.alt);
          }
        });
      }

      // Filter out forks, sort by updated
      const own = repos
        .filter(r => !r.fork)
        .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

      // Pinned repos — preserve PINNED_REPOS order
      const repoMap = new Map(own.map(r => [r.name, r]));
      const pinned = PINNED_REPOS.map(name => repoMap.get(name)).filter(Boolean);
      const pinnedSet = new Set(PINNED_REPOS);
      const rest = own.filter(r => !pinnedSet.has(r.name));

      if (pinned.length) {
        const pinnedSection = document.getElementById('pinnedSection');
        pinnedSection.style.display = '';
        const pinnedGrid = document.getElementById('pinnedGrid');
        pinned.forEach(r => pinnedGrid.appendChild(buildCard(r, true)));
      }

      // All other repos
      const repoContent = document.getElementById('repoContent');
      if (rest.length) {
        const grid = document.createElement('div');
        grid.className = 'repo-grid';
        rest.forEach(r => grid.appendChild(buildCard(r, false)));
        repoContent.replaceChildren(grid);
      } else {
        repoContent.innerHTML = '<p class="loading">No repositories found.</p>';
      }

    } catch (err) {
      document.getElementById('repoContent').innerHTML =
        `<div class="error" role="alert">Failed to load repositories.<br><small>${err.message}</small></div>`;
    }
  }

  init();
</script>

</body>
</html>
